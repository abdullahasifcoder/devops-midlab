version: '3.8'
services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: libuser
      POSTGRES_PASSWORD: libpass
      POSTGRES_DB: librarydb
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: ./backend
    image: backend:FA23-BCS-017
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://libuser:libpass@db:5432/librarydb
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: frontend:FA23-BCS-017
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
